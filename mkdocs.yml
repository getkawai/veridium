    - Deposit USDT: user-guide/deposit.md
    - Using AI Chat: user-guide/ai-chat.md
    - AI Image Generation: user-guide/image-generation.md
    - Free Trial: user-guide/free-trial.md
  
  - Rewards & Earnings:
    - Overview: rewards/overview.md
    - Mining Rewards: rewards/mining.md
    - Cashback System: rewards/cashback.md
    - Referral Program: rewards/referral.md
    - Claiming Rewards: rewards/claiming.md
  
  - Trading:
    - P2P Marketplace: trading/marketplace.md
    - Creating Orders: trading/create-order.md
    - Buying KAWAI: trading/buy.md
    - Selling KAWAI: trading/sell.md
  
  - Token Economics:
    - KAWAI Token: tokenomics/kawai-token.md
    - Reward Distribution: tokenomics/distribution.md

name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'
  BUN_VERSION: '1.3.1'
  R2_BUCKET: 'kawai'  # Change to your R2 bucket name
  R2_PUBLIC_URL: 'https://storage.getkawai.com'  # Change to your R2 public URL

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Kawai v${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          body: |
            ## 🎉 Kawai v${{ steps.get_version.outputs.version }}
            
            ### 📦 Downloads
            
            Choose the appropriate package for your platform:
            
            - **macOS**: `Kawai-${{ steps.get_version.outputs.version }}-macos-universal.tar.gz` (Intel + Apple Silicon)
            - **Linux**: `Kawai-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz`
            - **Windows**: `Kawai-${{ steps.get_version.outputs.version }}-windows-amd64.zip`
            
            ### 🔐 Verification
            
            Verify your download with SHA256 checksums in `checksums.txt`
            
            ### 📝 What's New
            
            <!-- Add release notes here -->
            
            ### 🐛 Bug Fixes
            
            <!-- Add bug fixes here -->

  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails
        run: go install github.com/yudaprama/wails/v3/cmd/wails3@v3.0.0-alpha.62-kawai

      - name: Update version in config
        run: |
          sed -i '' 's/version: ".*"/version: "${{ needs.prepare.outputs.version }}"/' build/config.yml

      - name: Build macOS Universal Binary
        run: make release-darwin

      - name: Create distribution archive
        run: |
          cd build/bin
          tar -czf Kawai-${{ needs.prepare.outputs.version }}-macos-universal.tar.gz Kawai.app
          shasum -a 256 Kawai-*.tar.gz > checksums-macos.txt

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            build/bin/Kawai-*.tar.gz
            build/bin/checksums-macos.txt

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: build/bin
          destination-dir: v${{ needs.prepare.outputs.version }}
          output-file-url: true

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_path: build/bin/Kawai-${{ needs.prepare.outputs.version }}-macos-universal.tar.gz
          asset_name: Kawai-${{ needs.prepare.outputs.version }}-macos-universal.tar.gz
          asset_content_type: application/gzip

  build-linux:
    name: Build Linux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/yudaprama/wails/v3/cmd/wails3@v3.0.0-alpha.62-kawai

      - name: Update version in config
        run: |
          sed -i 's/version: ".*"/version: "${{ needs.prepare.outputs.version }}"/' build/config.yml

      - name: Build Linux Binary
        run: make release-linux

      - name: Create distribution archive
        run: |
          cd build/bin
          tar -czf Kawai-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz Kawai
          sha256sum Kawai-*.tar.gz > checksums-linux.txt

      - name: Create Debian package
        run: make release-linux-deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/bin/Kawai-*.tar.gz
            build/bin/*.deb
            build/bin/checksums-linux.txt

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: build/bin
          destination-dir: v${{ needs.prepare.outputs.version }}
          output-file-url: true

      - name: Upload archive to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_path: build/bin/Kawai-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz
          asset_name: Kawai-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz
          asset_content_type: application/gzip

  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails
        run: go install github.com/yudaprama/wails/v3/cmd/wails3@v3.0.0-alpha.62-kawai

      - name: Update version in config
        run: |
          (Get-Content build/config.yml) -replace 'version: ".*"', 'version: "${{ needs.prepare.outputs.version }}"' | Set-Content build/config.yml

      - name: Build Windows Binary
        run: make release-windows

      - name: Create distribution archive
        run: |
          cd build/bin
          Compress-Archive -Path Kawai.exe -DestinationPath Kawai-${{ needs.prepare.outputs.version }}-windows-amd64.zip
          Get-FileHash -Algorithm SHA256 Kawai-*.zip | ForEach-Object { "$($_.Hash.ToLower())  $((Split-Path -Leaf $_.Path))" } | Out-File -Encoding ASCII checksums-windows.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/bin/Kawai-*.zip
            build/bin/checksums-windows.txt

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: build/bin
          destination-dir: v${{ needs.prepare.outputs.version }}
          output-file-url: true

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_path: build/bin/Kawai-${{ needs.prepare.outputs.version }}-windows-amd64.zip
          asset_name: Kawai-${{ needs.prepare.outputs.version }}-windows-amd64.zip
          asset_content_type: application/zip

  finalize:
    name: Finalize Release
    needs: [prepare, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine checksums
        run: |
          cat artifacts/*/checksums-*.txt > checksums.txt
          echo "📦 All checksums:"
          cat checksums.txt

      - name: Upload combined checksums
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_path: checksums.txt
          asset_name: checksums.txt
          asset_content_type: text/plain

      - name: Upload checksums to R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: .
          destination-dir: v${{ needs.prepare.outputs.version }}
          include-pattern: checksums.txt

      - name: Publish Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: 'v${{ needs.prepare.outputs.version }}'
            });
            
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              draft: false
            });
            
            console.log('✅ Release published!');
            console.log('📦 Downloads available at: ${{ env.R2_PUBLIC_URL }}/v${{ needs.prepare.outputs.version }}/');


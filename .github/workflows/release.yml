name: Release

on:
  push:
    tags:
      - "v*"

env:
  GO_VERSION: "1.23"
  BUN_VERSION: "latest"

permissions:
  contents: write

jobs:
  # ============================================
  # Build Release Binaries
  # ============================================
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: amd64
          - os: windows-latest
            platform: windows
            arch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Build frontend
        run: |
          cd frontend
          bun run build

      # Linux specific
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          wails3 build
          tar -czvf veridium-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz -C bin veridium

      # macOS specific
      - name: Build (macOS)
        if: matrix.platform == 'darwin'
        run: |
          wails3 build
          cd bin
          zip -r ../veridium-${{ matrix.platform }}-${{ matrix.arch }}.zip veridium.app

      # Windows specific
      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: |
          wails3 build
          Compress-Archive -Path bin\veridium.exe -DestinationPath veridium-${{ matrix.platform }}-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: veridium-${{ matrix.platform }}-${{ matrix.arch }}
          path: veridium-${{ matrix.platform }}-${{ matrix.arch }}.*

  # ============================================
  # Create GitHub Release
  # ============================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: Release Contributor (cmd/server)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      build_run_id:
        description: 'Optional build run ID (defaults to latest successful push build on master)'
        required: false
        type: string

permissions:
  contents: write
  actions: read
  packages: write

env:
  GO_VERSION: '1.26'
  R2_BUCKET: 'kawai'
  R2_PUBLIC_URL: 'https://storage.getkawai.com'
  GOPRIVATE: 'github.com/kawai-network/*'
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  build-linux:
    if: github.event_name != 'workflow_dispatch'
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build Linux ${{ matrix.arch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          BUILD_REF="${GITHUB_SHA::7}"
          mkdir -p bin
          go build -ldflags "-s -w -X github.com/kawai-network/veridium/cmd/server/api/services/kronk.tag=build-${BUILD_REF}" \
            -o bin/kawai-contributor ./cmd/server

      - name: Create distribution archive
        run: |
          BUILD_REF="${GITHUB_SHA::7}"
          cd bin
          tar -czf "kawai-contributor-build-${BUILD_REF}-linux-${{ matrix.arch }}.tar.gz" kawai-contributor
          sha256sum "kawai-contributor-build-${BUILD_REF}-linux-${{ matrix.arch }}.tar.gz" > "checksums-linux-${{ matrix.arch }}.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ matrix.arch }}
          retention-days: 30
          path: |
            bin/kawai-contributor-build-*.tar.gz
            bin/checksums-linux-*.txt

  build-macos:
    if: github.event_name != 'workflow_dispatch'
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build macOS ${{ matrix.arch }}
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          BUILD_REF="${GITHUB_SHA::7}"
          mkdir -p bin
          go build -ldflags "-s -w -X github.com/kawai-network/veridium/cmd/server/api/services/kronk.tag=build-${BUILD_REF} -extldflags '-mmacosx-version-min=12.0'" \
            -o bin/kawai-contributor ./cmd/server

      - name: Create distribution archive
        run: |
          BUILD_REF="${GITHUB_SHA::7}"
          cd bin
          tar -czf "kawai-contributor-build-${BUILD_REF}-darwin-${{ matrix.arch }}.tar.gz" kawai-contributor
          shasum -a 256 "kawai-contributor-build-${BUILD_REF}-darwin-${{ matrix.arch }}.tar.gz" > "checksums-darwin-${{ matrix.arch }}.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-build-${{ matrix.arch }}
          retention-days: 30
          path: |
            bin/kawai-contributor-build-*.tar.gz
            bin/checksums-darwin-*.txt

  build-windows:
    if: github.event_name != 'workflow_dispatch'
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install mingw
        run: |
          choco install mingw

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build Windows AMD64
        shell: powershell
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: |
          $BUILD_REF = "${{ github.sha }}".Substring(0,7)
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          go build -ldflags "-s -w -X github.com/kawai-network/veridium/cmd/server/api/services/kronk.tag=build-$BUILD_REF" -o bin/kawai-contributor.exe ./cmd/server

      - name: Create distribution archive
        run: |
          cd bin
          $BUILD_REF = "${{ github.sha }}".Substring(0,7)
          $ARCHIVE = "kawai-contributor-build-${BUILD_REF}-windows-amd64.zip"
          Compress-Archive -Path kawai-contributor.exe -DestinationPath $ARCHIVE
          Get-FileHash -Algorithm SHA256 $ARCHIVE | ForEach-Object { "$($_.Hash.ToLower())  $((Split-Path -Leaf $_.Path))" } | Out-File -Encoding ASCII checksums-windows-amd64.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          retention-days: 30
          path: |
            bin/kawai-contributor-build-*.zip
            bin/checksums-windows-amd64.txt

  release:
    if: github.event_name == 'workflow_dispatch'
    name: Release From Latest Build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve build run ID
        id: resolve_run
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          INPUT_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          if [ -n "$INPUT_RUN_ID" ]; then
            echo "run_id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/release-contributor.yml/runs" \
            --jq '.workflow_runs | map(select(.event=="push" and .head_branch=="master" and .conclusion=="success")) | first | .id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful push build found on master"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download Linux build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          run_id: ${{ steps.resolve_run.outputs.run_id }}
          name: linux-build-amd64
          path: artifacts/linux

      - name: Download macOS build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          run_id: ${{ steps.resolve_run.outputs.run_id }}
          name: darwin-build-arm64
          path: artifacts/darwin

      - name: Download Windows build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          run_id: ${{ steps.resolve_run.outputs.run_id }}
          name: windows-build
          path: artifacts/windows

      - name: Prepare release assets
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          cp artifacts/linux/kawai-contributor-build-*-linux-amd64.tar.gz "release-assets/kawai-contributor-${VERSION}-linux-amd64.tar.gz"
          cp artifacts/darwin/kawai-contributor-build-*-darwin-arm64.tar.gz "release-assets/kawai-contributor-${VERSION}-darwin-arm64.tar.gz"
          cp artifacts/windows/kawai-contributor-build-*-windows-amd64.zip "release-assets/kawai-contributor-${VERSION}-windows-amd64.zip"

          (
            cd release-assets
            sha256sum kawai-contributor-${VERSION}-* > checksums.txt
          )

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: contributor-v${{ inputs.version }}
          name: Kawai Contributor v${{ inputs.version }}
          draft: true
          prerelease: false
          body: |
            ## 🎉 Kawai Contributor v${{ inputs.version }}

            Release dibuat dari latest successful build pada branch `master` tanpa rebuild.

            ### 📦 Downloads
            - **Linux AMD64**: `kawai-contributor-${{ inputs.version }}-linux-amd64.tar.gz`
            - **macOS ARM64**: `kawai-contributor-${{ inputs.version }}-darwin-arm64.tar.gz`
            - **Windows AMD64**: `kawai-contributor-${{ inputs.version }}-windows-amd64.zip`
            - **Checksums**: `checksums.txt`
          files: |
            release-assets/kawai-contributor-${{ inputs.version }}-linux-amd64.tar.gz
            release-assets/kawai-contributor-${{ inputs.version }}-darwin-arm64.tar.gz
            release-assets/kawai-contributor-${{ inputs.version }}-windows-amd64.zip
            release-assets/checksums.txt

      - name: Upload release assets to Cloudflare R2
        uses: yudaprama/r2-upload-action@master
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: release-assets
          destination-dir: ${{ inputs.version }}/contributor
          output-file-url: true

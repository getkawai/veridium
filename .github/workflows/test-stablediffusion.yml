name: Test Stable Diffusion Package

on:
  push:
  pull_request:

env:
  GOPRIVATE: 'github.com/kawai-network/*'
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Get dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        shell: bash
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./pkg/stablediffusion/...
        env:
          CGO_ENABLED: 1

      - name: Run tests with coverage report
        run: go test -v -cover ./pkg/stablediffusion/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          file: ./coverage.txt
          flags: stablediffusion
          name: stablediffusion-coverage
          fail_ci_if_error: false

  test-integration:
    name: Integration Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Get dependencies
        run: go mod download

      - name: Test library download (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: go test -v ./pkg/stablediffusion -run TestEnsureLibrary

      - name: Test library download (macOS)
        if: matrix.os == 'macos-latest'
        run: go test -v ./pkg/stablediffusion -run TestEnsureLibrary

      - name: Test library download (Windows)
        if: matrix.os == 'windows-latest'
        run: go test -v ./pkg/stablediffusion -run TestEnsureLibrary

      - name: Verify library installation
        run: go test -v ./pkg/stablediffusion -run TestIsLibraryInstalled

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          args: --timeout=5m ./pkg/stablediffusion/...
          skip-cache: false

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build package
        run: go build -v ./pkg/stablediffusion/...

      - name: Build examples (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          for dir in pkg/stablediffusion/examples/*/; do
            if [ -f "$dir/main.go" ]; then
              echo "Building $dir"
              go build -v "$dir" || echo "Build failed for $dir"
            fi
          done

      - name: Build examples (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Path pkg/stablediffusion/examples -Directory | ForEach-Object {
            if (Test-Path "$($_.FullName)/main.go") {
              Write-Host "Building $($_.Name)"
              go build -v "$($_.FullName)" 2>&1 | Out-Null
            }
          }

  test-subpackages:
    name: Test Subpackages on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        package:
          - config
          - download
          - local
          - remote
          - models
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Get dependencies
        run: go mod download

      - name: Test ${{ matrix.package }} package
        run: go test -v -cover ./pkg/stablediffusion/${{ matrix.package }}/...

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, test-integration, lint, build, test-subpackages]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "Test Results Summary:"
          echo "- Unit Tests: ${{ needs.test.result }}"
          echo "- Integration Tests: ${{ needs.test-integration.result }}"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Subpackage Tests: ${{ needs.test-subpackages.result }}"
          
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.test-integration.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test-subpackages.result }}" != "success" ]; then
            echo "Some tests failed!"
            exit 1
          fi
          
          echo "All tests passed!"

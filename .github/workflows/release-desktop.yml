name: Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'
  BUN_VERSION: '1.3.1'
  R2_BUCKET: 'kawai'
  R2_PUBLIC_URL: 'https://storage.getkawai.com'

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=0.1.5" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Kawai v${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          body: |
            ## 🎉 Kawai v${{ steps.get_version.outputs.version }}
            
            ### 📦 Downloads
            
            Choose the appropriate package for your platform:
            
            - **macOS ARM64**: `Kawai-${{ steps.get_version.outputs.version }}-macos-arm64.tar.gz` (Apple Silicon)
            - **macOS AMD64**: `Kawai-${{ steps.get_version.outputs.version }}-macos-amd64.tar.gz` (Intel)
            - **Linux**: `Kawai-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz`
            - **Windows**: `Kawai-${{ steps.get_version.outputs.version }}-windows-amd64.zip`
            
            ### 🔐 Verification
            
            Verify your download with SHA256 checksums in `checksums.txt`
            
            ### 📝 What's New
            
            <!-- Add release notes here -->
            
            ### 🐛 Bug Fixes
            
            <!-- Add bug fixes here -->

  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Update version in config
        run: |
          sed -i '' 's/version: ".*"/version: "${{ needs.prepare.outputs.version }}"/' build/config.yml

      - name: Build macOS ARM64
        run: |
          echo "Building ARM64..."
          export NODE_OPTIONS="--max-old-space-size=8192"
          PRODUCTION=true ARCH=arm64 wails3 task darwin:build
          wails3 task darwin:create:app:bundle
          mv bin/Kawai.app bin/Kawai-arm64.app

      - name: Build macOS AMD64
        run: |
          echo "Building AMD64..."
          export NODE_OPTIONS="--max-old-space-size=8192"
          PRODUCTION=true ARCH=amd64 wails3 task darwin:build
          wails3 task darwin:create:app:bundle
          mv bin/Kawai.app bin/Kawai-amd64.app

      - name: Create distribution archives
        run: |
          cd bin
          tar -czf Kawai-${{ needs.prepare.outputs.version }}-macos-arm64.tar.gz Kawai-arm64.app
          tar -czf Kawai-${{ needs.prepare.outputs.version }}-macos-amd64.tar.gz Kawai-amd64.app
          shasum -a 256 Kawai-${{ needs.prepare.outputs.version }}-macos-arm64.tar.gz > checksums-macos-arm64.txt
          shasum -a 256 Kawai-${{ needs.prepare.outputs.version }}-macos-amd64.tar.gz > checksums-macos-amd64.txt

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            bin/Kawai-*.tar.gz
            bin/checksums-macos-*.txt

      - name: Prepare R2 upload
        run: |
          mkdir -p r2-upload
          cp bin/Kawai-*.tar.gz r2-upload/
          cp bin/checksums-macos-*.txt r2-upload/

      - name: Upload to Cloudflare R2
        uses: yudaprama/r2-upload-action@master
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: r2-upload
          destination-dir: ${{ needs.prepare.outputs.version }}/desktop
          output-file-url: true

  build-linux:
    name: Build Linux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Update version in config
        run: |
          sed -i 's/version: ".*"/version: "${{ needs.prepare.outputs.version }}"/' build/config.yml

      - name: Build Linux Binary
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          PRODUCTION: 'true'
        run: wails3 task linux:build

      - name: Create distribution archive
        run: |
          cd bin
          tar -czf Kawai-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz Kawai
          sha256sum Kawai-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz > checksums-linux-amd64.txt

      - name: Create Debian package
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          PRODUCTION: 'true'
        run: make release-linux-deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            bin/Kawai-*.tar.gz
            bin/checksums-linux-amd64.txt

      - name: Prepare R2 upload
        run: |
          mkdir -p r2-upload
          cp bin/Kawai-*.tar.gz r2-upload/
          cp bin/checksums-linux-amd64.txt r2-upload/

      - name: Upload to Cloudflare R2
        uses: yudaprama/r2-upload-action@master
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: r2-upload
          destination-dir: ${{ needs.prepare.outputs.version }}/desktop
          output-file-url: true

  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Update version in config
        run: |
          (Get-Content build/config.yml) -replace 'version: ".*"', 'version: "${{ needs.prepare.outputs.version }}"' | Set-Content build/config.yml

      - name: Build Windows Binary
        shell: powershell
        run: |
          $env:CGO_ENABLED = "1"
          $env:CC = "gcc"
          $env:PRODUCTION = "true"
          $env:NODE_OPTIONS = "--max-old-space-size=8192"
          # Wait for any file locks to release
          Start-Sleep -Seconds 10
          # Retry build up to 3 times if file lock error occurs
          $maxRetries = 3
          $retryCount = 0
          $success = $false
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              wails3 task windows:build
              $success = $true
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Host "Build failed, retrying in 10 seconds... (Attempt $retryCount of $maxRetries)"
                Start-Sleep -Seconds 10
              } else {
                throw
              }
            }
          }

      - name: Create distribution archive
        run: |
          cd bin
          Compress-Archive -Path Kawai.exe -DestinationPath Kawai-${{ needs.prepare.outputs.version }}-windows-amd64.zip
          Get-FileHash -Algorithm SHA256 Kawai-${{ needs.prepare.outputs.version }}-windows-amd64.zip | ForEach-Object { "$($_.Hash.ToLower())  $((Split-Path -Leaf $_.Path))" } | Out-File -Encoding ASCII checksums-windows-amd64.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            bin/Kawai-*.zip
            bin/checksums-windows-amd64.txt

      - name: Prepare R2 upload
        run: |
          New-Item -ItemType Directory -Force -Path r2-upload
          Copy-Item bin/Kawai-*.zip r2-upload/
          Copy-Item bin/checksums-windows-amd64.txt r2-upload/

      - name: Upload to Cloudflare R2
        uses: yudaprama/r2-upload-action@master
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: r2-upload
          destination-dir: ${{ needs.prepare.outputs.version }}/desktop
          output-file-url: true
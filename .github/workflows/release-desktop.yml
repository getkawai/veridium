name: Release Desktop

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      build_run_id:
        description: 'Optional build run ID (defaults to latest successful push build on master)'
        required: false
        type: string

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'
  BUN_VERSION: '1.3.9'
  R2_BUCKET: 'kawai'
  R2_PUBLIC_URL: 'https://storage.getkawai.com'
  GOPRIVATE: 'github.com/kawai-network/*'
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

permissions:
  contents: write
  actions: read
  packages: write

jobs:
  guard-jarvis-import-path:
    name: Guard Legacy Jarvis Import Path
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Reject legacy jarvis imports outside legacy package
        run: |
          if rg -n "github.com/kawai-network/veridium/pkg/jarvis" --glob '**/*.go' --glob '!pkg/jarvis/**' .; then
            echo "Found legacy imports. Use github.com/kawai-network/y/jarvis instead."
            exit 1
          fi

  build-macos:
    needs: guard-jarvis-import-path
    if: github.event_name != 'workflow_dispatch'
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Update build version in config
        run: |
          BUILD_REF="${GITHUB_SHA::7}"
          sed -i '' "s/version: \".*\"/version: \"build-${BUILD_REF}\"/" build/config.yml

      - name: Build macOS ARM64
        run: |
          echo "Building ARM64..."
          export NODE_OPTIONS="--max-old-space-size=8192"
          PRODUCTION=true ARCH=arm64 wails3 task darwin:build
          wails3 task darwin:create:app:bundle
          mv bin/Kawai.app bin/Kawai-arm64.app

      - name: Build macOS AMD64
        run: |
          echo "Building AMD64..."
          export NODE_OPTIONS="--max-old-space-size=8192"
          PRODUCTION=true ARCH=amd64 wails3 task darwin:build
          wails3 task darwin:create:app:bundle
          mv bin/Kawai.app bin/Kawai-amd64.app

      - name: Create distribution archives
        run: |
          BUILD_REF="${GITHUB_SHA::7}"
          cd bin
          tar -czf "Kawai-build-${BUILD_REF}-macos-arm64.tar.gz" Kawai-arm64.app
          tar -czf "Kawai-build-${BUILD_REF}-macos-amd64.tar.gz" Kawai-amd64.app
          shasum -a 256 "Kawai-build-${BUILD_REF}-macos-arm64.tar.gz" > checksums-macos-arm64.txt
          shasum -a 256 "Kawai-build-${BUILD_REF}-macos-amd64.tar.gz" > checksums-macos-amd64.txt

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          retention-days: 30
          path: |
            bin/Kawai-build-*.tar.gz
            bin/checksums-macos-*.txt

  build-linux:
    needs: guard-jarvis-import-path
    if: github.event_name != 'workflow_dispatch'
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Update build version in config
        run: |
          BUILD_REF="${GITHUB_SHA::7}"
          sed -i "s/version: \".*\"/version: \"build-${BUILD_REF}\"/" build/config.yml

      - name: Build Linux Binary
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          PRODUCTION: 'true'
        run: wails3 task linux:build

      - name: Create distribution archive
        run: |
          BUILD_REF="${GITHUB_SHA::7}"
          cd bin
          tar -czf "Kawai-build-${BUILD_REF}-linux-amd64.tar.gz" Kawai
          sha256sum "Kawai-build-${BUILD_REF}-linux-amd64.tar.gz" > checksums-linux-amd64.txt

      - name: Create Debian package
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          PRODUCTION: 'true'
        run: make release-linux-deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          retention-days: 30
          path: |
            bin/Kawai-build-*.tar.gz
            bin/Kawai-*.deb
            bin/checksums-linux-amd64.txt

  build-windows:
    needs: guard-jarvis-import-path
    if: github.event_name != 'workflow_dispatch'
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Update build version in config
        run: |
          $BUILD_REF = "${{ github.sha }}".Substring(0,7)
          $VERSION_LINE = 'version: "build-' + $BUILD_REF + '"'
          (Get-Content build/config.yml) -replace 'version: ".*"', $VERSION_LINE | Set-Content build/config.yml

      - name: Install frontend dependencies
        run: |
          cd frontend
          bun install
          cd ..

      - name: Build Windows Binary
        shell: powershell
        run: |
          $env:CGO_ENABLED = "1"
          $env:CC = "gcc"
          $env:PRODUCTION = "true"
          $env:NODE_OPTIONS = "--max-old-space-size=8192"
          Start-Sleep -Seconds 10
          $maxRetries = 3
          $retryCount = 0
          $success = $false
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              wails3 task windows:build
              $success = $true
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Host "Build failed, retrying in 10 seconds... (Attempt $retryCount of $maxRetries)"
                Start-Sleep -Seconds 10
              } else {
                throw
              }
            }
          }

      - name: Create distribution archive
        run: |
          cd bin
          $BUILD_REF = "${{ github.sha }}".Substring(0,7)
          $ARCHIVE = "Kawai-build-${BUILD_REF}-windows-amd64.zip"
          Compress-Archive -Path Kawai.exe -DestinationPath $ARCHIVE
          Get-FileHash -Algorithm SHA256 $ARCHIVE | ForEach-Object { "$($_.Hash.ToLower())  $((Split-Path -Leaf $_.Path))" } | Out-File -Encoding ASCII checksums-windows-amd64.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          retention-days: 30
          path: |
            bin/Kawai-build-*.zip
            bin/checksums-windows-amd64.txt

  release:
    if: github.event_name == 'workflow_dispatch'
    name: Release From Latest Build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve build run ID
        id: resolve_run
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          INPUT_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          if [ -n "$INPUT_RUN_ID" ]; then
            echo "run_id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/release-desktop.yml/runs" \
            --jq '.workflow_runs | map(select(.event=="push" and .head_branch=="master" and .conclusion=="success")) | first | .id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful push build found on master"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download macOS build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          run_id: ${{ steps.resolve_run.outputs.run_id }}
          name: macos-build
          path: artifacts/macos

      - name: Download Linux build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          run_id: ${{ steps.resolve_run.outputs.run_id }}
          name: linux-build
          path: artifacts/linux

      - name: Download Windows build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          run_id: ${{ steps.resolve_run.outputs.run_id }}
          name: windows-build
          path: artifacts/windows

      - name: Prepare release assets
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          cp artifacts/macos/Kawai-build-*-macos-arm64.tar.gz "release-assets/Kawai-${VERSION}-macos-arm64.tar.gz"
          cp artifacts/macos/Kawai-build-*-macos-amd64.tar.gz "release-assets/Kawai-${VERSION}-macos-amd64.tar.gz"
          cp artifacts/linux/Kawai-build-*-linux-amd64.tar.gz "release-assets/Kawai-${VERSION}-linux-amd64.tar.gz"
          cp artifacts/windows/Kawai-build-*-windows-amd64.zip "release-assets/Kawai-${VERSION}-windows-amd64.zip"

          if ls artifacts/linux/Kawai-*.deb >/dev/null 2>&1; then
            cp artifacts/linux/Kawai-*.deb "release-assets/Kawai-${VERSION}-linux-amd64.deb"
          fi

          (
            cd release-assets
            sha256sum Kawai-${VERSION}-* > checksums.txt
          )

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Kawai v${{ inputs.version }}
          draft: true
          prerelease: false
          body: |
            ## 🎉 Kawai v${{ inputs.version }}

            Release dibuat dari latest successful build pada branch `master` tanpa rebuild.

            ### 📦 Downloads
            - **macOS ARM64**: `Kawai-${{ inputs.version }}-macos-arm64.tar.gz`
            - **macOS AMD64**: `Kawai-${{ inputs.version }}-macos-amd64.tar.gz`
            - **Linux AMD64**: `Kawai-${{ inputs.version }}-linux-amd64.tar.gz`
            - **Windows AMD64**: `Kawai-${{ inputs.version }}-windows-amd64.zip`
            - **Checksums**: `checksums.txt`
          files: |
            release-assets/*

      - name: Upload release assets to Cloudflare R2
        uses: yudaprama/r2-upload-action@master
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ env.R2_BUCKET }}
          source-dir: release-assets
          destination-dir: ${{ inputs.version }}/desktop
          output-file-url: true

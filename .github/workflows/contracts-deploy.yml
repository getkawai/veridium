name: Deploy Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Network to deploy to"
        required: true
        type: choice
        options:
          - sepolia
          - mainnet
      contract:
        description: "Contract to deploy (leave empty for all)"
        required: false
        type: string

env:
  FOUNDRY_PROFILE: default

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.network }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network }}
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: forge build

      - name: Run tests before deploy
        run: forge test -vvv

      - name: Deploy contracts
        run: |
          echo "🚀 Deploying to ${{ github.event.inputs.network }}..."
          # Add your deployment script here
          # forge script script/DeployKawai.s.sol --rpc-url ${{ secrets.RPC_URL }} --broadcast --verify
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}


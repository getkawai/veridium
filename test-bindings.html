<!DOCTYPE html>
<html>
<head>
    <title>Test Wails Bindings</title>
</head>
<body>
    <h1>Test AgentChatService Bindings</h1>
    <button onclick="testChat()">Test Chat</button>
    <pre id="output"></pre>

    <script type="module">
        // Import bindings
        import * as AgentChatService from './frontend/bindings/github.com/kawai-network/veridium/internal/services/agentchatservice.js';
        import { ChatRequest } from './frontend/bindings/github.com/kawai-network/veridium/internal/services/models.js';

        window.testChat = async function() {
            const output = document.getElementById('output');
            output.textContent = 'Testing...\n';

            try {
                // Check if service is available
                output.textContent += 'AgentChatService methods: ' + Object.keys(AgentChatService).join(', ') + '\n';

                // Try to call Chat
                const request = new ChatRequest({
                    session_id: 'test-session',
                    user_id: 'test-user',
                    message: 'Hello from test!'
                });

                output.textContent += 'Calling AgentChatService.Chat()...\n';
                const response = await AgentChatService.Chat(request);
                
                output.textContent += 'Response: ' + JSON.stringify(response, null, 2);
            } catch (error) {
                output.textContent += 'Error: ' + error.message + '\n';
                output.textContent += 'Stack: ' + error.stack;
            }
        };
    </script>
</body>
</html>

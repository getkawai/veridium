# Air configuration for Kawai Contributor Node hot reload
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
args_bin = []
bin = "./bin/kawai-contributor"
cmd = "go build -o ./bin/kawai-contributor ./cmd/server"
delay = 1000
exclude_dir = ["frontend", "data", "build", "bin", "tmp", "contracts", "docs", "site", "kawai-website", "internal/database/generated"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "mod", "sum"]
kill_delay = "0s"
log = "build-errors.log"
send_interrupt = false
stop_on_root = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true

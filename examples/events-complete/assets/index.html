<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wails Event System Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .control-group h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2em;
            color: #fff;
        }

        button {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px 0 rgba(31, 38, 135, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(31, 38, 135, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .event-log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }

        .event-item {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 8px;
            border-left: 4px solid;
            background: rgba(255, 255, 255, 0.1);
        }

        .event-user-updated {
            border-left-color: #4CAF50;
        }

        .event-notification {
            border-left-color: #FF9800;
        }

        .event-task-progress {
            border-left-color: #2196F3;
        }

        .event-theme-changed {
            border-left-color: #9C27B0;
        }

        .event-window-focused {
            border-left-color: #F44336;
        }

        .event-app-startup {
            border-left-color: #795548;
        }

        .timestamp {
            color: #ccc;
            font-size: 0.8em;
            float: right;
        }

        .event-data {
            margin-top: 5px;
            font-size: 0.9em;
            opacity: 0.9;
        }

        .clear-btn {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            margin-top: 15px;
        }

        .status {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(5px);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 20px;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Wails Event System Demo</h1>
        
        <div class="status" id="status">
            <strong>Status:</strong> <span id="status-text">Waiting for events...</span>
        </div>

        <div class="controls">
            <div class="control-group">
                <h3>👤 User Events</h3>
                <button onclick="emitUserUpdate()">Update User</button>
                <button onclick="emitBulkUserUpdates()">Bulk Update</button>
            </div>

            <div class="control-group">
                <h3>🔔 Notifications</h3>
                <button onclick="emitInfoNotification()">Info</button>
                <button onclick="emitHighPriorityNotification()">High Priority</button>
                <button onclick="emitUrgentNotification()">Urgent</button>
            </div>

            <div class="control-group">
                <h3>⚡ System Events</h3>
                <button onclick="emitWindowFocused()">Window Focus</button>
                <button onclick="emitCustomEvent()">Custom Event</button>
                <button onclick="triggerDragTest()">Test Drag & Drop</button>
            </div>

            <div class="control-group">
                <h3>📋 Testing</h3>
                <button onclick="clearLog()">Clear Log</button>
                <button onclick="simulateError()">Test Error</button>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="event-log" id="event-log">
            <h3>📊 Event Log</h3>
            <p><em>Events will appear here as they are received from the backend...</em></p>
        </div>
    </div>

    <script type="module">
        import * as wails from "/wails/runtime.js";

        // Event counter for testing OnMultiple
        let eventCounter = 0;

        // Set up event listeners
        function setupEventListeners() {
            console.log("Setting up event listeners...");

            // User events
            wails.Events.On("user-updated", (data) => {
                addEvent("User Updated", data, "event-user-updated");
                updateStatus("User updated: " + data.name);
            });

            wails.Events.On("user-log", (data) => {
                addEvent("User Log", data, "event-user-updated");
            });

            // Notification events
            wails.Events.On("notification", (data) => {
                addEvent("Notification", data, "event-notification");
                updateStatus("Notification: " + data.message);
            });

            // Progress events
            wails.Events.On("task-progress", (data) => {
                addEvent("Task Progress", data, "event-task-progress");
                updateProgress(data.percent);
            });

            // Theme events
            wails.Events.On("theme-changed", (data) => {
                addEvent("Theme Changed", data, "event-theme-changed");
                updateStatus("Theme changed to: " + data);
            });

            // Window events
            wails.Events.On("window-focused", (data) => {
                addEvent("Window Focused", data, "event-window-focused");
                updateStatus("Window focused: " + data);
            });

            // App startup event (Once)
            wails.Events.Once("app-startup", (data) => {
                addEvent("App Startup", data, "event-app-startup");
                updateStatus("App is ready!");
            });

            // Limited event test (OnMultiple)
            wails.Events.OnMultiple("limited-event", (data) => {
                eventCounter++;
                addEvent("Limited Event #" + eventCounter, data, "event-user-updated");
            });

            // File processed events
            wails.Events.On("file-processed", (data) => {
                addEvent("File Processed", data, "event-task-progress");
            });

            console.log("Event listeners set up successfully!");
        }

        // Helper function to add events to log
        function addEvent(title, data, cssClass) {
            const log = document.getElementById('event-log');
            const eventItem = document.createElement('div');
            eventItem.className = `event-item ${cssClass}`;
            
            const timestamp = new Date().toLocaleTimeString();
            
            eventItem.innerHTML = `
                <strong>${title}</strong>
                <span class="timestamp">${timestamp}</span>
                <div class="event-data">${JSON.stringify(data, null, 2)}</div>
            `;
            
            log.appendChild(eventItem);
            
            // Auto-scroll to bottom
            log.scrollTop = log.scrollHeight;
            
            // Keep only last 50 events
            const events = log.querySelectorAll('.event-item');
            if (events.length > 50) {
                events[0].remove();
            }
        }

        // Helper function to update status
        function updateStatus(message) {
            const statusText = document.getElementById('status-text');
            statusText.textContent = message;
            
            // Clear status after 3 seconds
            setTimeout(() => {
                statusText.textContent = "Waiting for events...";
            }, 3000);
        }

        // Helper function to update progress bar
        function updateProgress(percent) {
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = percent + '%';
            
            if (percent >= 100) {
                setTimeout(() => {
                    progressBar.style.width = '0%';
                }, 1000);
            }
        }

        // Event emission functions
        function emitUserUpdate() {
            const user = {
                id: Math.floor(Math.random() * 1000),
                name: "User" + Math.floor(Math.random() * 100),
                age: 18 + Math.floor(Math.random() * 50)
            };
            wails.Events.Emit('user-updated', user);
        }

        function emitBulkUserUpdates() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    emitUserUpdate();
                }, i * 200);
            }
        }

        function emitInfoNotification() {
            const notification = {
                type: "info",
                message: "This is an information notification",
                priority: 3
            };
            wails.Events.Emit('notification', notification);
        }

        function emitHighPriorityNotification() {
            const notification = {
                type: "warning",
                message: "This is a high priority notification",
                priority: 8
            };
            wails.Events.Emit('notification', notification);
        }

        function emitUrgentNotification() {
            const notification = {
                type: "urgent",
                message: "This is an urgent notification",
                priority: 10
            };
            wails.Events.Emit('notification', notification);
        }

        function emitWindowFocused() {
            const windowData = {
                name: "Main Window",
                timestamp: new Date().toISOString(),
                focused: true
            };
            wails.Events.Emit('window-focused', windowData);
        }

        function emitCustomEvent() {
            const customData = {
                message: "This is a custom event from frontend",
                timestamp: new Date().toISOString(),
                source: "frontend"
            };
            wails.Events.Emit('custom-event', customData);
        }

        function triggerDragTest() {
            updateStatus("Drag and drop functionality - drag files to this window");
            addEvent("Drag Test", "Drag files to this window to test drag & drop", "event-task-progress");
        }

        function clearLog() {
            const log = document.getElementById('event-log');
            log.innerHTML = '<h3>📊 Event Log</h3><p><em>Events will appear here as they are received from the backend...</em></p>';
        }

        function simulateError() {
            try {
                // This will cause an error in the frontend
                nonExistentFunction();
            } catch (error) {
                wails.Events.Emit('custom-event', {
                    type: "error",
                    message: "Frontend error simulated",
                    error: error.message
                });
            }
        }

        // Initialize event listeners when page loads
        setupEventListeners();

        // Add some demo events after a delay
        setTimeout(() => {
            addEvent("System", "Event listeners initialized successfully", "event-app-startup");
        }, 1000);

        // Add periodic demo events
        setInterval(() => {
            if (Math.random() < 0.1) { // 10% chance every 5 seconds
                emitUserUpdate();
            }
        }, 5000);

        console.log("Frontend event system initialized!");
    </script>
</body>
</html>
